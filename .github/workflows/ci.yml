name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uvx ruff check src/ tests/

      - name: Format check
        run: uvx ruff format --check src/ tests/

      - name: Type check
        run: uv run mypy src/ --ignore-missing-imports

      - name: Tests
        run: uv run pytest --tb=short -q

  v-model-gaps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install kuzu
        run: pip install kuzu

      - name: Clone v-model-traceability
        run: git clone https://github.com/sjswerdloff/v-model-traceability.git /tmp/v-model-traceability

      - name: V-model gap analysis
        run: >
          PYTHONPATH=/tmp/v-model-traceability
          python scripts/check_v_model_gaps.py
