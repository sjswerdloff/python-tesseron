name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run mypy src/ --ignore-missing-imports

      - name: Tests
        run: uv run pytest --tb=short -q

  v-model-gaps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install kuzu
        run: pip install kuzu

      - name: Clone v-model-traceability
        run: git clone https://github.com/sjswerdloff/v-model-traceability.git /tmp/v-model-traceability

      - name: V-model gap analysis
        id: gap-check
        continue-on-error: true
        run: >
          PYTHONPATH=/tmp/v-model-traceability
          python scripts/check_v_model_gaps.py

  v-model-enforce:
    needs: v-model-gaps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for implementation changes
        id: check-src
        run: |
          if git diff --name-only origin/main...HEAD | grep -q '^src/'; then
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "src_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce gap analysis on implementation PRs
        if: steps.check-src.outputs.src_changed == 'true' && needs.v-model-gaps.result != 'success'
        run: |
          echo "FAIL: Implementation changes require a clean V-model traceability chain."
          echo "The v-model-gaps job reported gaps. All requirements must have design contracts"
          echo "and all design contracts must have test cases before implementation can merge."
          exit 1
