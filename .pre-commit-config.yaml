repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src/ --ignore-missing-imports
        language: system
        stages: [pre-push]
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest --tb=short -q
        language: system
        stages: [pre-push]
        pass_filenames: false
